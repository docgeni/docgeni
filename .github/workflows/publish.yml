name: Publish Docgeni

# wpm publish 需要 push tag，需开启 contents 写权限（仓库 Settings → Actions → Workflow permissions → Read and write）
permissions:
    contents: write
    pull-requests: write

on:
    pull_request:
        types:
            - opened
            - reopened
    pull_request_review:
        types:
            - submitted
    check_suite:
        types:
            - completed
    status: {}

jobs:
    autoApprove:
        if: startsWith(github.head_ref, 'release-auto')
        runs-on: ubuntu-latest
        steps:
            - uses: hmarr/auto-approve-action@v3
              with:
                  review-message: 'Auto approve sync PRs to auto merge them'

    publish:
        if: startsWith(github.head_ref, 'release-auto')
        needs: [autoApprove]
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.head_ref }}
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  registry-url: https://registry.npmjs.org/
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Configure git for push tag
              run: |
                  git config user.name github-actions
                  git config user.email github-actions@github.com
                  git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

            - name: Publish (stable)
              if: startsWith(github.head_ref, 'release-auto-v')
              run: pnpm run pub
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Publish (next)
              if: startsWith(github.head_ref, 'release-auto-next-v')
              run: pnpm run pub-next
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Read package.json
              id: read-version
              uses: notiz-dev/github-action-json-property@release
              with:
                  path: packages/cli/package.json
                  prop_path: version

            # 如需通知，将 url 替换为你们的 webhook 地址
            # - name: Send message to webhook
            #   uses: joelwmale/webhook-action@master
            #   with:
            #     url: ${{ secrets.RELEASE_WEBHOOK_URL }}
            #     body: '{ "version": "${{ steps.read-version.outputs.prop }}", "name": "@docgeni/cli" }'

    autoMerge:
        if: startsWith(github.head_ref, 'release-auto-')
        needs: [publish]
        runs-on: ubuntu-latest
        steps:
            - name: Auto merge PR
              uses: pascalgn/automerge-action@v0.15.5
              env:
                  GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
                  MERGE_METHOD: 'squash'
                  MERGE_LABELS: ''
                  MERGE_FORKS: 'false'
                  MERGE_RETRIES: '20'
                  MERGE_RETRY_SLEEP: '60000'
